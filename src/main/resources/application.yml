spring:
  application:
    name: meet-app
  datasource:
    url: jdbc:h2:mem:meetapp;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    show-sql: true

server:
  port: 8080

logging:
  level:
    org.springframework.security: INFO
    org.hibernate.SQL: DEBUG

app:
  jwt:
    secret: "very-secret-key-change-in-prod"
    access-token-validity-seconds: 3600
  photos:
    upload-dir: "uploads/photos"

